<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview — SMTP Automated Tool</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #fafafa;
    color: #111111;
    min-height: 100vh;
    padding: 40px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  .container {
    max-width: 820px;
    width: 100%;
  }

  .card {
    background: #ffffff;
    padding: 40px 48px;
    border: 1px solid #e0e0e0;
    border-radius: 0;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
  }

  .back-link {
    display: inline-block;
    color: #555555;
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 16px;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .back-link:hover {
    border-bottom-color: #000000;
    color: #000000;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #000000;
    border-bottom: 2px solid #000000;
    padding-bottom: 14px;
    margin-bottom: 24px;
  }

  h1 small {
    font-size: 14px;
    font-weight: 400;
    color: #555555;
    display: block;
    margin-top: 4px;
  }

  .stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    padding: 16px 0 20px;
    border-bottom: 1px solid #ececec;
    margin-bottom: 24px;
  }

  .stat-item {
    font-size: 14px;
    color: #444444;
  }

  .stat-item strong {
    color: #000000;
    font-weight: 700;
  }

  .stat-item code {
    background: #f0f0f0;
    padding: 2px 8px;
    font-size: 12px;
    color: #000000;
    border: 1px solid #dddddd;
    font-family: 'SF Mono', 'Courier New', monospace;
  }

  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #000000;
    margin: 20px 0 8px;
    letter-spacing: -0.2px;
  }

  .box {
    border: 1.5px solid #cccccc;
    padding: 18px 20px;
    background: #fafafa;
    margin-bottom: 4px;
    font-size: 15px;
    line-height: 1.7;
    color: #111111;
    word-wrap: break-word;
  }

  .box pre {
    font-family: 'SF Mono', 'Courier New', monospace;
    font-size: 13px;
    white-space: pre-wrap;
    color: #111111;
    background: transparent;
    margin: 0;
    padding: 0;
    border: none;
  }

  .box.html-content {
    background: #ffffff;
  }

  .box.html-content * {
    max-width: 100%;
  }

  .actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #ececec;
    align-items: center;
  }

  .btn {
    display: inline-block;
    padding: 12px 32px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: #ffffff;
    background: #000000;
    border: 1.5px solid #000000;
    border-radius: 0;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.3px;
    text-decoration: none;
  }

  .btn:hover {
    background: #222222;
    border-color: #222222;
  }

  .btn:active {
    transform: scale(0.98);
  }

  .btn-secondary {
    background: transparent;
    color: #000000;
    border-color: #999999;
  }

  .btn-secondary:hover {
    background: #f0f0f0;
    border-color: #000000;
  }

  .btn-danger {
    background: #111111;
    border-color: #111111;
  }

  .btn-danger:hover {
    background: #000000;
    border-color: #000000;
  }

  .back-bottom {
    display: inline-block;
    margin-top: 20px;
    color: #555555;
    text-decoration: none;
    font-size: 14px;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }

  .back-bottom:hover {
    border-bottom-color: #000000;
    color: #000000;
  }

  @media (max-width: 600px) {
    .card {
      padding: 24px 20px;
    }
    h1 {
      font-size: 22px;
    }
    .stats {
      gap: 16px;
    }
    .actions {
      flex-direction: column;
    }
    .btn {
      width: 100%;
      text-align: center;
    }
  }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <a href="/" class="back-link">← Back</a>

    <h1>
      Preview
      <small>First recipient sample</small>
    </h1>

    <div class="stats">
      <span class="stat-item">Total recipients: <strong>{{ total_recipients }}</strong></span>
      <span class="stat-item">
        Placeholders:
        {% for p in used_placeholders %}
          <code>{{ p }}</code>
        {% endfor %}
      </span>
    </div>

    <div class="section-title">Subject</div>
    <div class="box">{{ preview_subject }}</div>

    <div class="section-title" style="margin-top:24px;">Body</div>
    <div class="box {% if is_html %}html-content{% endif %}">
      {% if is_html %}
        {{ preview_body | safe }}
      {% else %}
        <pre>{{ preview_body }}</pre>
      {% endif %}
    </div>

    <div class="actions">
      <form action="/send" method="post" style="display:inline;">
        <input type="hidden" name="csv_filename" value="{{ csv_filename }}">
        <input type="hidden" name="subject_template" value="{{ subject_template }}">
        <input type="hidden" name="body_template" value="{{ template_str }}">
        <input type="hidden" name="is_html" value="{{ template_is_html }}">
        <button type="submit" class="btn" onclick="return confirm('Send to all {{ total_recipients }} recipients. Are you sure?');">
          ✓ Confirm & Send to {{ total_recipients }}
        </button>
      </form>
    </div>

    <a href="/" class="back-bottom">← Return to start</a>
  </div>
</div>
</body>
</html>
